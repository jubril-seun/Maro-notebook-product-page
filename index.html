<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maro Notebook Pro</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
            <h2 class="maro-logo"><a href="#">Maro</a></h2>
            <nav>
                <ul class="nav-list">
                    <li><a href="#">Shop</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Reviews</a></li>
                    <li><a href="#">Cart (0)</a></li>
                </ul>
            </nav>
        </div>

    <div class="product-section-1">
        <img class="product-img" src="images/maro-noterbook.jpeg" alt="notebook image">
        <div class="product-purchase-section">
           <div class="instock-tag">In stock</div> 
           <div class="notebook-title">
               <h2>Maro Notebook Pro</h2>
               <p>A4 · Hardcover · Dot grid</p>
           </div>
           <div class="notebook-price">
               <h2>$34.00</h2>
               <p>Free shipping on orders over $50</p>
           </div>
           <div class="notebook-colors">
               <h5 class="identifier-text">Color</h5>
               <div class="colors">
                <div class="color-circle black-color"></div>
                <div class="color-circle blue-color"></div>
                <div class="color-circle green-color"></div>
                <div class="color-circle red-color"></div>
               </div>
           </div>
           <h5 class="identifier-text">Quantity</h5>
           <div class="quantity-button">
            <div class="minus-button">-</div>
            <div class="amount-counter">1</div>
            <div class="plus-button">+</div>
           </div>
           <button class="atc-button">Add to Cart</button>
           <button class="stw-button">Save to wishlist</button>
           <div class="product-benefit-section">
               <div class="product-benefit-1">
                <div class="green-checkmark"></div>
                <p class="pb-text">180gsm acid-free paper</p>
               </div>
               <div class="product-benefit-2">
                <div class="green-checkmark"></div>
                <p class="pb-text">Lay-flat binding</p>
               </div>
               <div class="product-benefit-3">
                <div class="green-checkmark"></div>
                <p class="pb-text">240 pages · ribbon bookmark</p>
               </div>
           </div>
        </div>
    </div>
</body>
</html>
