<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maro Notebook Pro</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
            <h2 class="maro-logo">Maro</h2>
            <nav>
                <ul class="nav-list">
                    <li><a href="#">Shop</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Reviews</a></li>
                    <li><a href="#">Cart (0)</a></li>
                </ul>
            </nav>
        </div>

    <div class="product-section-1">
        <div class="product-image">
            <img src="images/maro-noterbook.jpeg" alt="notebook image" width="300px">
        </div>
        <div class="product-purchase-section">
           <div class="instock-tag">In stock</div> 
           <h2>Maro Notebook Pro</h2>
           <p>A4 · Hardcover · Dot grid</p>
           <h2>$34.00</h2>
           <p>Free shipping on orders over $50</p>
           <h5>Color</h5>
           <div class="colors">
            <div class="black-color"></div>
            <div class="blue-color"></div>
            <div class="green-color"></div>
            <div class="red-color"></div>
           </div>
           <h5>Quantity</h5>
           <div class="quantity-button">
            <div class="minus-button"></div>
            <div class="amount-counter"></div>
            <div class="plus-button"></div>
           </div>
           <button class="atc-button">Add to Cart</button>
           <button class="stw-button">Save to wishlist</button>
           <div class="product-benefit-1">
            <div class="green-checkmark"></div>
            <p class="pb-text">180gsm acid-free paper</p>
           </div>
           <div class="product-benefit-2">
            <div class="green-checkmark"></div>
            <p class="pb-text">Lay-flat binding</p>
           </div>
           <div class="product-benefit-3">
            <div class="green-checkmark"></div>
            <p class="pb-text">240 pages · ribbon bookmark</p>
           </div>
        </div>
    </div>
</body>
</html>
